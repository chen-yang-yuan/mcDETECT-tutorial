# Copies tutorial Markdown from mcDETECT into docs/tutorial_pages/ for Sphinx + Read the Docs.
# Set MC_DETECT_REPO to owner/mcDETECT. For a private mcDETECT repo, add secret MC_DETECT_READ_TOKEN.

name: Sync tutorial from mcDETECT

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  MC_DETECT_REPO: chen-yang-yuan/mcDETECT

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout mcDETECT-tutorial (this repo)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout mcDETECT (source tutorial)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MC_DETECT_REPO }}
          path: _upstream_mcdetect
          # For a private mcDETECT repo, create a PAT with repo read and set secret MC_DETECT_READ_TOKEN:
          # token: ${{ secrets.MC_DETECT_READ_TOKEN }}

      - name: Copy tutorial markdown into docs/tutorial_pages
        run: |
          set -eux
          DEST="docs/tutorial_pages"
          mkdir -p "$DEST"
          rsync -av \
            --include='README.md' \
            --include='0[1-8]_*.md' \
            --include='readthedocs_github_action.md' \
            --exclude='*' \
            _upstream_mcdetect/tutorial/ \
            "$DEST/"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/tutorial_pages
          if git diff --staged --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "Sync tutorial pages from ${{ env.MC_DETECT_REPO }}"
          git push
